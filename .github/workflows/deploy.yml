name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CALCOM_URL: ${{ secrets.VITE_CALCOM_URL }}
          VITE_CALCOM_USERNAME: ${{ secrets.VITE_CALCOM_USERNAME }}
          VITE_JYOTISHAM_API_KEY: ${{ secrets.VITE_JYOTISHAM_API_KEY }}

      - name: Install deploy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 76.13.243.165 >> ~/.ssh/known_hosts

      - name: Sync build to VPS
        run: |
          rsync -avz --delete -e "ssh -p 2222 -i ~/.ssh/deploy_key" \
            dist/ deploy@76.13.243.165:/var/www/astrodilipsharma/dist/

      - name: Reload nginx
        run: ssh -p 2222 -i ~/.ssh/deploy_key deploy@76.13.243.165 "sudo systemctl reload nginx"
